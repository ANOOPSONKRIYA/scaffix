name: Scaffix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run formatting check
        run: black --check src tests

      - name: Run tests
        run: pytest

      - name: Verify import
        run: |
          python -c "import scaffix; print(scaffix.__version__)"