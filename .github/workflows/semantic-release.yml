name: Semantic Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released || 'false' }}
      tag: ${{ steps.semantic.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate version sync
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          init_text = Path("src/scaffix/__init__.py").read_text(encoding="utf-8")
          pyproject_text = Path("pyproject.toml").read_text(encoding="utf-8")

          init_match = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)
          project_match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', pyproject_text)

          if not init_match or not project_match:
              raise SystemExit("Could not parse versions from __init__.py/pyproject.toml")

          if init_match.group(1) != project_match.group(1):
              raise SystemExit(
                  f"Version mismatch: __init__={init_match.group(1)} pyproject={project_match.group(1)}"
              )
          print(f"Version sync OK: {init_match.group(1)}")
          PY

      - name: Run tests
        run: pytest

      - name: Semantic version and GitHub release
        id: semantic
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com

      - name: Build package for PyPI
        if: steps.semantic.outputs.released == 'true'
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distribution artifacts
        if: steps.semantic.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'

    permissions:
      contents: read

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: distribution-artifacts
          path: dist

      - name: Verify downloaded distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
